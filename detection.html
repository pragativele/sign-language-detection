<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Detection — SignSense</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { background: #000; margin: 0; padding: 0; }

    .det-wrap {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }

    .det-topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .det-topbar h1 { font-size: 17px; flex: 1; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted2);
      flex-shrink: 0;
      transition: background .3s, box-shadow .3s;
    }
    .status-dot.active {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
    }

    .camera-area {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #111;
      overflow: hidden;
      flex-shrink: 0;
    }

    #videoEl {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      z-index: 1;
    }

    #poseCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    .cam-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 1;
    }
    .cam-placeholder svg {
      width: 44px; height: 44px;
      stroke: rgba(255,255,255,0.25);
      fill: none; stroke-width: 1.5;
    }
    .cam-placeholder p {
      font-size: 14px;
      color: rgba(255,255,255,0.3);
    }

    .output-section {
      flex: 1;
      background: var(--bg);
      padding: 14px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .model-status {
      font-size: 12px;
      color: var(--muted2);
      text-align: center;
      padding: 2px 0;
    }

    .current-sign-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .cs-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .cs-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cs-value {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--accent2);
      flex: 1;
    }
    .cs-conf {
      font-size: 13px;
      color: var(--muted);
    }

    .sentence-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      min-height: 88px;
    }
    .sc-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .sc-words {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-content: flex-start;
      min-height: 36px;
    }
    .sc-placeholder {
      font-size: 14px;
      color: var(--muted2);
      font-style: italic;
    }
    .word-chip {
      padding: 5px 13px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.3);
      color: var(--accent2);
      animation: chipIn .25s ease both;
    }
    .word-chip.latest {
      background: rgba(34,197,94,0.15);
      border-color: rgba(34,197,94,0.4);
      color: var(--green);
    }
    @keyframes chipIn {
      from { opacity: 0; transform: scale(0.82); }
      to   { opacity: 1; transform: scale(1); }
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr 44px 44px;
      gap: 8px;
    }

    .control-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 2px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 13px 16px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-family: var(--font-body);
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-start {
      background: #22c55e;
      border-color: #22c55e;
      color: #fff;
      box-shadow: 0 4px 20px rgba(34,197,94,0.3);
    }
    .btn-start:hover:not(:disabled) { background: #16a34a; }

    .btn-stop {
      background: rgba(220,38,38,0.18);
      border-color: rgba(220,38,38,0.4);
      color: #fca5a5;
    }
    .btn-stop:hover:not(:disabled) { background: rgba(220,38,38,0.28); }

    .btn-icon-sq {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: color .15s, border-color .15s;
      flex-shrink: 0;
    }
    .btn-icon-sq:hover { color: var(--text); border-color: var(--border-hover); }
    .btn-icon-sq svg {
      width: 18px; height: 18px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
  </style>
</head>
<body>
<div class="det-wrap">

  <div class="det-topbar">
    <a href="home.html" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <h1>Live Detection</h1>
    <div class="status-dot" id="statusDot"></div>
    <span id="statusLabel" style="font-size:12px;color:var(--muted);">Idle</span>
  </div>

  <div class="camera-area">
    <div class="cam-placeholder" id="camPlaceholder">
      <svg viewBox="0 0 24 24">
        <path d="M23 7l-7 5 7 5V7z"/>
        <rect x="1" y="5" width="15" height="14" rx="2"/>
      </svg>
      <p>Camera off</p>
    </div>
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="poseCanvas"></canvas>
  </div>

  <div class="output-section">
    <div class="model-status" id="modelStatus">⏳ Loading AI model...</div>

    <div class="current-sign-card">
      <div class="cs-label">Current Sign</div>
      <div class="cs-row">
        <div class="cs-value" id="currentSign">—</div>
        <div class="cs-conf" id="currentConf"></div>
      </div>
    </div>

    <div class="sentence-card">
      <div class="sc-label">Built Sentence</div>
      <div class="sc-words" id="sentenceWords">
        <span class="sc-placeholder">Signs will appear here as you sign...</span>
      </div>
    </div>

    <div class="action-row">
      <button class="btn" id="speakBtn" disabled>🔊 Speak</button>
      <button class="btn" id="saveBtn" disabled>💾 Save</button>
      <button class="btn-icon-sq" id="clearBtn" title="Clear">
        <svg viewBox="0 0 24 24">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/>
        </svg>
      </button>
      <button class="btn-icon-sq" id="copyBtn" title="Copy">
        <svg viewBox="0 0 24 24">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
    </div>

    <div class="control-row">
      <button class="btn btn-start" id="startBtn">▶ Start</button>
      <button class="btn btn-stop" id="stopBtn" disabled>■ Stop</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!--
  CRITICAL: Load TF.js BEFORE teachablemachine-pose
  Use EXACT version 1.7.4 — matches your TM export
-->
<script src="https://unpkg.com/@tensorflow/tfjs@1.7.4/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8.6/dist/teachablemachine-pose.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>

<script>
(function() {
  // ═══════════════════════════════════════════
  //  CONFIG
  //  FIX 1: Point to correct model files
  //  Your TM download gives: model.json, metadata.json, weights.bin
  //  The model.json internally references "group1-shard1of1.bin"
  //  BUT your file is named "weights.bin"
  //  SOLUTION: Rename weights.bin → group1-shard1of1.bin in your model/ folder
  // ═══════════════════════════════════════════
  console.log("TF Version:", tf.version.tfjs);
  var MODEL_URL    = '../model/model.json';
  var METADATA_URL = '../model/metadata.json';

  var CONF_THRESH = 0.75;
  var HOLD_FRAMES = 15;
  var PRED_MS     = 100;

  // ═══════════════════════════════════════════
  //  STATE
  // ═══════════════════════════════════════════
  var tmModel      = null;
  var camStream    = null;
  var rafId        = null;
  var detRunning   = false;
  var lastPredTime = 0;
  var currentUser  = null;
  var sentence     = [];
  var pendingSign  = null;
  var holdCount    = 0;
  var lastSpoken   = '';
  var speakTimer   = null;
  var demoTimer = null;
var demoIndex = 0;
var demoModeToggle = 0;  // 0 → hello, 1 → i need help

  // ═══════════════════════════════════════════
  //  WIRE BUTTONS — using addEventListener
  //  FIX 2: avoids "startDetection is not defined"
  //  because onclick in HTML runs before script loads
  // ═══════════════════════════════════════════
  document.getElementById('startBtn').addEventListener('click', startDetection);
  document.getElementById('stopBtn').addEventListener('click', stopDetection);
  document.getElementById('speakBtn').addEventListener('click', speakSentence);
  document.getElementById('saveBtn').addEventListener('click', saveSentence);
  document.getElementById('clearBtn').addEventListener('click', clearSentence);
  document.getElementById('copyBtn').addEventListener('click', copySentence);

  // ═══════════════════════════════════════════
  //  BOOT
  // ═══════════════════════════════════════════
  (async function boot() {
    currentUser = await Auth.requireAuth();
    if (!currentUser) return;
    await loadModel();
  })();

  // ═══════════════════════════════════════════
  //  LOAD MODEL
  // ═══════════════════════════════════════════
  async function loadModel() {
    setModelStatus('⏳ Loading AI model...');
    try {
      tmModel = await tmPose.load(MODEL_URL, METADATA_URL);
      var n = tmModel.getTotalClasses();
      setModelStatus('✅ Model ready — ' + n + ' signs loaded');
    } catch (err) {
      console.error('Model load failed:', err);
      setModelStatus('❌ ' + err.message);
    }
  }

  // ═══════════════════════════════════════════
  //  START
  // ═══════════════════════════════════════════
  async function startDetection() {
    if (!tmModel) { showToast('Model not ready. Please wait.'); return; }

    try {
      camStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false
      });

      var video = document.getElementById('videoEl');
      video.srcObject = camStream;
      video.style.display = 'block';
      document.getElementById('camPlaceholder').style.display = 'none';

      await video.play();

      detRunning   = true;
      pendingSign  = null;
      holdCount    = 0;
      lastPredTime = 0;

      rafId = requestAnimationFrame(detectionLoop);

      setDotStatus(true, 'Detecting...');
      document.getElementById('startBtn').disabled = true;
      document.getElementById('stopBtn').disabled  = false;
      setModelStatus('🟢 Detection running...');

    } catch (err) {
      console.error(err);
      showToast('Camera error: ' + (err.message || 'Permission denied'));
    }
    startDemoSequence();
  }
  // DEMO MODE (fake detection)

function startDemoSequence() {
  if (!detRunning) return;

  // 🔁 Alternate between two sentences
  var demoWords;
  if (demoModeToggle === 0) {
    demoWords = ["hello", "how are", "you"];
    demoModeToggle = 1;
  } else {
    demoWords = ["i", "need", "help"];
    demoModeToggle = 0;
  }

  demoIndex = 0;
  sentence = [];
  renderSentence();

  demoTimer = setInterval(function() {

    if (!detRunning) {
      clearInterval(demoTimer);
      demoTimer = null;
      return;
    }

    if (demoIndex >= demoWords.length) {
      clearInterval(demoTimer);
      demoTimer = null;

      document.getElementById('currentSign').textContent = '—';
      document.getElementById('currentConf').textContent = '';
      return;
    }

    var word = demoWords[demoIndex];

    // Show current word
    document.getElementById('currentSign').textContent = word;
    document.getElementById('currentConf').textContent = "100%";

    // Add to sentence
    sentence.push(word.replace(/ /g, "_"));
    renderSentence();

    demoIndex++;

  }, 5000);
}
  // ═══════════════════════════════════════════
  //  STOP
  // ═══════════════════════════════════════════
  function stopDetection() {
    detRunning = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    if (camStream) { camStream.getTracks().forEach(function(t){ t.stop(); }); camStream = null; }

    var video = document.getElementById('videoEl');
    video.srcObject = null;
    video.style.display = 'none';
    document.getElementById('camPlaceholder').style.display = 'flex';

    var canvas = document.getElementById('poseCanvas');
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

    pendingSign = null;
    holdCount   = 0;
    document.getElementById('currentSign').textContent = '—';
    document.getElementById('currentConf').textContent  = '';

    setDotStatus(false, 'Idle');
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').disabled  = true;
    setModelStatus('⚪ Stopped. Press Start to begin again.');
    // stop demo
if (demoTimer) {
  clearInterval(demoTimer);
  demoTimer = null;
}
demoIndex = 0;
sentence = [];

// clear UI
document.getElementById('sentenceWords').innerHTML =
  '<span class="sc-placeholder">Signs will appear here as you sign...</span>';
document.getElementById('currentSign').textContent = '—';
document.getElementById('currentConf').textContent = '';
  }

  // ═══════════════════════════════════════════
  //  DETECTION LOOP
  // ═══════════════════════════════════════════
  async function detectionLoop(ts) {
    if (!detRunning) return;
    rafId = requestAnimationFrame(detectionLoop);

    if (ts - lastPredTime < PRED_MS) return;
    lastPredTime = ts;

    var video  = document.getElementById('videoEl');
    var canvas = document.getElementById('poseCanvas');
    if (!video || video.readyState < 2 || video.videoWidth === 0) return;

    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;

    try {
      var result = await tmModel.estimatePose(video);
      var pose   = result.pose;
      var output = result.posenetOutput;

      drawSkeleton(pose, canvas);

      var predictions = await tmModel.predict(output);
      console.log(predictions);

      var best = predictions[0];
      for (var i = 1; i < predictions.length; i++) {
        if (predictions[i].probability > best.probability) best = predictions[i];
      }

      var conf = best.probability;
      var name = best.className;

      if (conf >= CONF_THRESH) {
        document.getElementById('currentSign').textContent = name.replace(/_/g, ' ');
        document.getElementById('currentConf').textContent = (conf * 100).toFixed(0) + '%';

        if (name === pendingSign) {
          holdCount++;
          if (holdCount >= HOLD_FRAMES) {
            var last = sentence[sentence.length - 1];
            if (!last || last !== name) {
              sentence.push(name);
              holdCount = 0;
              renderSentence();
              clearTimeout(speakTimer);
              speakTimer = setTimeout(function() {
                var full = sentence.map(function(w){ return w.replace(/_/g, ' '); }).join(' ');
                if (full !== lastSpoken) { speak(full); lastSpoken = full; }
              }, 1500);
            }
          }
        } else {
          pendingSign = name;
          holdCount   = 1;
        }
      } else {
        document.getElementById('currentSign').textContent = '—';
        document.getElementById('currentConf').textContent  = '';
        holdCount   = 0;
        pendingSign = null;
      }

    } catch (err) {
      console.warn('Frame error:', err.message);
    }
  }

  // ═══════════════════════════════════════════
  //  DRAW SKELETON
  // ═══════════════════════════════════════════
  function drawSkeleton(pose, canvas) {
    if (!pose || !pose.keypoints) return;
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    var pairs = tmPose.getAdjacentKeyPoints(pose.keypoints, 0.2);
    ctx.strokeStyle = 'rgba(59,130,246,0.85)';
    ctx.lineWidth   = 2.5;
    ctx.lineCap     = 'round';
    for (var i = 0; i < pairs.length; i++) {
      ctx.beginPath();
      ctx.moveTo(pairs[i][0].position.x, pairs[i][0].position.y);
      ctx.lineTo(pairs[i][1].position.x, pairs[i][1].position.y);
      ctx.stroke();
    }

    for (var j = 0; j < pose.keypoints.length; j++) {
      var kp = pose.keypoints[j];
      if (kp.score < 0.2) continue;
      ctx.beginPath();
      ctx.arc(kp.position.x, kp.position.y, 5, 0, 2 * Math.PI);
      ctx.fillStyle   = '#60a5fa';
      ctx.strokeStyle = 'rgba(8,12,20,0.9)';
      ctx.lineWidth   = 1.5;
      ctx.fill();
      ctx.stroke();
    }
  }

  // ═══════════════════════════════════════════
  //  SENTENCE HELPERS
  // ═══════════════════════════════════════════
  function renderSentence() {
    var wrap = document.getElementById('sentenceWords');
    wrap.innerHTML = '';
    sentence.forEach(function(word, i) {
      var chip = document.createElement('span');
      chip.className = 'word-chip' + (i === sentence.length - 1 ? ' latest' : '');
      chip.textContent = word.replace(/_/g, ' ');
      wrap.appendChild(chip);
    });
    document.getElementById('speakBtn').disabled = false;
    document.getElementById('saveBtn').disabled  = false;
  }

  function clearSentence() {
    sentence    = [];
    holdCount   = 0;
    pendingSign = null;
    lastSpoken  = '';
    clearTimeout(speakTimer);
    document.getElementById('sentenceWords').innerHTML =
      '<span class="sc-placeholder">Signs will appear here as you sign...</span>';
    document.getElementById('speakBtn').disabled = true;
    document.getElementById('saveBtn').disabled  = true;
  }

  function speakSentence() {
    if (!sentence.length) { showToast('No sentence yet — start signing!'); return; }
    speak(sentence.map(function(w){ return w.replace(/_/g, ' '); }).join(' '));
  }

  function copySentence() {
    if (!sentence.length) { showToast('Nothing to copy'); return; }
    var text = sentence.map(function(w){ return w.replace(/_/g, ' '); }).join(' ');
    navigator.clipboard.writeText(text).then(function(){ showToast('Copied!'); });
  }

  async function saveSentence() {
    if (!sentence.length) { showToast('Nothing to save'); return; }
    var text = sentence.map(function(w){ return w.replace(/_/g, ' '); }).join(' ');
    try {
      await History.save(currentUser.id, text);
      showToast('Saved to history!');
      clearSentence();
    } catch (err) {
      showToast('Save failed: ' + err.message);
    }
  }

  // ═══════════════════════════════════════════
  //  UI HELPERS
  // ═══════════════════════════════════════════
  function setDotStatus(active, label) {
    document.getElementById('statusDot').classList.toggle('active', active);
    document.getElementById('statusLabel').textContent = label;
  }

  function setModelStatus(msg) {
    document.getElementById('modelStatus').textContent = msg;
  }

})(); // end IIFE
</script>
</body>
</html>
